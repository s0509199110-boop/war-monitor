# Render Blueprint — https://render.com/docs/blueprint-spec
# שורש הריפו חייב להכיל monitor.html + package.json + תיקיית backend (לא לבחור Root Directory = backend)
#
# חשוב: קובץ .env המקומי לא עולה לגיט — ב-Render → Environment יש להזין ידנית Secrets:
#   OPENAI_API_KEY, TELEGRAM_BOT_TOKEN (אם משתמשים בטלגרם), OPENSKY_* אופציונלי
# בדיקה: GET https://YOUR-SERVICE.onrender.com/health — שדה deployment (בלי חשיפת סודות)
#
# פריסה מהירה (אחרי git push ל-GitHub):
# 1) render.com — Sign up — Connect GitHub
# 2) New — Blueprint — בחר ריפו — Deploy
# 3) בסוף: כתובת https://war-monitor.onrender.com (או דומה) — פותחים מהטלפון
# 4) Environment: העתק משתנים מ-.env.example לפי הצורך (ללא העלאת .env לגיט)
services:
  - type: web
    name: war-monitor
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: TZOFAR_BACKUP_ENABLED
        value: "1"
      - key: TRUST_PROXY_HOPS
        value: "1"
      - key: OREF_CLIENT_SOCKET_EMIT_GAP_MS
        value: "5"  # מהיר יותר - 5ms במקום 36ms ברירת מחדל
      - key: OREF_POLL_MS
        value: "1000"  # Poll לפיקוד העורף כל שנייה במקום 1.5 שניות
      # דורש בנוסף ב-Dashboard: OPENAI_API_KEY + TELEGRAM_BOT_TOKEN — אחרת הפולר יוצא מיד
      - key: TELEGRAM_MISSILE_AI
        value: "1"
