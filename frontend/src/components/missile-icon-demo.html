<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial;
        }
        .container {
            text-align: center;
        }
        h3 {
            color: white;
            margin-bottom: 30px;
        }
        .icon-demo {
            display: inline-block;
            margin: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h3>אפשרויות אייקון טיל - בחר את המועדף עליך</h3>
        
        <!-- אפשרות 1: טיל פשוט עם אש -->
        <div class="icon-demo">
            <svg width="64" height="64" viewBox="0 0 64 64">
                <!-- אש מאחורה -->
                <ellipse cx="20" cy="32" rx="12" ry="8" fill="#ff6600" opacity="0.8">
                    <animate attributeName="rx" values="12;15;12" dur="0.3s" repeatCount="indefinite"/>
                </ellipse>
                <ellipse cx="20" cy="32" rx="8" ry="5" fill="#ffaa00" opacity="0.9">
                    <animate attributeName="rx" values="8;10;8" dur="0.2s" repeatCount="indefinite"/>
                </ellipse>
                <!-- גוף הטיל -->
                <path d="M 25 28 L 50 32 L 25 36 Z" fill="#cccccc" stroke="#888" stroke-width="1"/>
                <!-- ראש הטיל -->
                <path d="M 50 28 L 58 32 L 50 36 Z" fill="#ff4444" stroke="#cc0000" stroke-width="1"/>
                <!-- כנפיים -->
                <path d="M 35 28 L 30 22 L 38 28 Z" fill="#999"/>
                <path d="M 35 36 L 30 42 L 38 36 Z" fill="#999"/>
            </svg>
            <p style="color:white;">אפשרות 1: טיל פשוט</p>
        </div>
        
        <!-- אפשרות 2: טיל מקצועי -->
        <div class="icon-demo">
            <svg width="64" height="64" viewBox="0 0 64 64">
                <!-- להבה גדולה מאחורה -->
                <path d="M 15 32 Q 5 25, 10 32 Q 5 32, 12 35 Q 8 38, 18 32" fill="#ff4400" opacity="0.8">
                    <animateTransform attributeName="transform" type="scale" values="1;1.2;1" dur="0.15s" repeatCount="indefinite"/>
                </path>
                <path d="M 18 32 Q 12 28, 15 32 Q 12 32, 16 34" fill="#ffaa00" opacity="0.9">
                    <animateTransform attributeName="transform" type="scale" values="1;1.3;1" dur="0.1s" repeatCount="indefinite"/>
                </path>
                <!-- גוף הטיל -->
                <rect x="22" y="29" width="25" height="6" rx="1" fill="#silver"/>
                <rect x="22" y="29" width="25" height="6" rx="1" fill="url(#grad1)"/>
                <!-- ראש הטיל -->
                <path d="M 47 29 L 55 32 L 47 35 Z" fill="#ff3333"/>
                <!-- פסים על הטיל -->
                <line x1="30" y1="29" x2="30" y2="35" stroke="#666" stroke-width="1"/>
                <line x1="38" y1="29" x2="38" y2="35" stroke="#666" stroke-width="1"/>
                <!-- כנף עליונה -->
                <path d="M 30 29 L 26 20 L 35 29 Z" fill="#888"/>
                <!-- כנף תחתונה -->
                <path d="M 30 35 L 26 44 L 35 35 Z" fill="#888"/>
                
                <defs>
                    <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#e0e0e0;stop-opacity:1" />
                        <stop offset="50%" style="stop-color:#a0a0a0;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#707070;stop-opacity:1" />
                    </linearGradient>
                </defs>
            </svg>
            <p style="color:white;">אפשרות 2: טיל מקצועי</p>
        </div>
        
        <!-- אפשרות 3: טיל עם זוהר -->
        <div class="icon-demo">
            <svg width="64" height="64" viewBox="0 0 64 64">
                <defs>
                    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
                        <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                    <linearGradient id="fireGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#ff0000;stop-opacity:1" />
                        <stop offset="50%" style="stop-color:#ff8800;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#ffff00;stop-opacity:1" />
                    </linearGradient>
                </defs>
                
                <!-- אש עם זוהר -->
                <ellipse cx="18" cy="32" rx="15" ry="10" fill="url(#fireGrad)" filter="url(#glow)" opacity="0.9">
                    <animate attributeName="rx" values="15;18;15" dur="0.1s" repeatCount="indefinite"/>
                    <animate attributeName="ry" values="10;12;10" dur="0.12s" repeatCount="indefinite"/>
                </ellipse>
                
                <!-- גוף הטיל -->
                <path d="M 25 28 L 50 30 L 50 34 L 25 36 Z" fill="#c0c0c0" stroke="#666" stroke-width="1"/>
                
                <!-- ראש הטיל -->
                <path d="M 50 30 L 58 32 L 50 34 Z" fill="#ff2222" stroke="#cc0000" stroke-width="1"/>
                
                <!-- זוהר סביב הטיל -->
                <ellipse cx="42" cy="32" rx="20" ry="12" fill="none" stroke="#ffaa00" stroke-width="2" opacity="0.3" filter="url(#glow)">
                    <animate attributeName="rx" values="20;22;20" dur="0.5s" repeatCount="indefinite"/>
                </ellipse>
            </svg>
            <p style="color:white;">אפשרות 3: טיל עם זוהר</p>
        </div>
        
        <!-- אפשרות 4: טיל מודרני מינימליסטי -->
        <div class="icon-demo">
            <svg width="64" height="64" viewBox="0 0 64 64">
                <!-- אש -->
                <path d="M 12 32 Q 8 28, 14 30 Q 10 32, 16 34 Q 8 35, 12 32" fill="#ff6600">
                    <animateTransform attributeName="transform" type="translate" values="0 0; -3 0; 0 0" dur="0.1s" repeatCount="indefinite"/>
                </path>
                <circle cx="18" cy="32" r="4" fill="#ffaa00">
                    <animate attributeName="r" values="4;6;4" dur="0.1s" repeatCount="indefinite"/>
                </circle>
                
                <!-- טיל פשוט -->
                <rect x="22" y="30" width="28" height="4" rx="2" fill="#ddd"/>
                <circle cx="50" cy="32" r="4" fill="#ff4444"/>
                
                <!-- זנב -->
                <path d="M 22 30 L 18 26 L 22 30 L 18 34 Z" fill="#888"/>
            </svg>
            <p style="color:white;">אפשרות 4: מינימליסטי</p>
        </div>
        
    </div>
</body>
</html>
